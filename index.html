<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body style="background-color:rgb(213, 224, 231); width:100%; height:700px; display:flex; flex-direction:column; align-items:center; justify-content:center; ">
    <div style="background-color:white; width:250px; height:350px; border-radius:10px; box-shadow: 4px 4px 5px 0px rgb(174, 171, 171); display:flex; flex-direction:column; align-items:center; ">
      <img src="/images/image-qr-code.png" alt="QR" style="width:80%; height:60%; border-radius:15px; padding-top:10px;"/>
      <h5 style="text-align:center ; margin-top:14px; margin-bottom:0px;">
            Improve your front-end skills by building projects
      </h5>
      <p style="text-align:center; font-size:10px; color:rgb(166, 165, 165);">
            Scan the QR code to visit Frontend Mentor and take your coding skills to the next level
      </p>
    </div>

 
  <footer class="attribution" style="padding-top:20px;">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://www.frontendmentor.io/profile/RAGHAD-BP">Raghad Alsuwayhi</a>.
  </footer>
</body>
</html>
